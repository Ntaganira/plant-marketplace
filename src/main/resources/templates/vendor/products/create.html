<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/main-layout}">

<div layout:fragment="content">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card">

                <div class="card-body">

                    <h3 class="fw-bold mb-4">

                        Create Product

                    </h3>

                    <form th:action="@{/vendor/products/create}" method="post" th:object="${product}">

                        <div class="mb-3">

                            <label class="form-label">
                                Product Name
                            </label>

                            <input type="text" class="form-control" th:field="*{name}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Price
                            </label>

                            <input type="number" step="0.01" class="form-control" th:field="*{price}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Stock Quantity
                            </label>

                            <input type="number" class="form-control" th:field="*{stockQuantity}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Thumbnail URL
                            </label>

                            <input type="text" class="form-control" th:field="*{thumbnailUrl}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea class="form-control" rows="5" th:field="*{description}">
                            </textarea>

                        </div>

                        <button class="btn btn-success">

                            Save Product

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</html>
