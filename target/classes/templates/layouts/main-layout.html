<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head th:replace="~{fragments/head :: head}">
    <title th:text="${seo != null
        ? seo.title
        : 'Rwanda Plant Marketplace'}">
    </title>

    <meta name="description" th:content="${seo != null
      ? seo.description
      : 'Buy plants and gardening products in Rwanda'}">

    <meta name="keywords" th:content="${seo != null
      ? seo.keywords
      : 'plants, flowers, trees, Rwanda'}">

    <meta property="og:title" th:content="${seo != null
      ? seo.title
      : 'Rwanda Plant Marketplace'}">

    <meta property="og:description" th:content="${seo != null
      ? seo.description
      : 'Marketplace for plants and nurseries'}">

    <meta property="og:image" th:content="${seo != null
      ? seo.image
      : '/assets/images/logo.png'}">

</head>

<body data-sidebar="dark">

    <div id="layout-wrapper">

        <!-- Header -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <!-- Main Content -->
        <div class="main-content">

            <div class="page-content">

                <div class="container-fluid">

                    <div layout:fragment="content"></div>

                </div>

            </div>

            <!-- Footer -->
            <div th:replace="~{fragments/footer :: footer}"></div>

        </div>

    </div>

    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
