<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/main-layout}">

<div layout:fragment="content">

    <div class="row mb-4">

        <div class="col-12">

            <h2 class="fw-bold">

                Search Results

            </h2>

        </div>

    </div>

    <div class="row">

        <div class="col-xl-3 col-lg-4 col-md-6" th:each="product : ${products}">

            <div class="card product-card">

                <img th:src="${product.thumbnailUrl}" class="card-img-top product-image">

                <div class="card-body">

                    <h5 th:text="${product.name}">
                    </h5>

                    <h4 class="text-success">

                        <span th:text="${product.price}">
                        </span>

                    </h4>

                    <a th:href="@{/products/{slug}(slug=${product.slug})}" class="btn btn-success w-100">

                        View Product

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</html>
