<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/main-layout}">

<div layout:fragment="content">

    <div class="row mb-4">

        <div class="col-12">

            <h2 class="fw-bold">
                Marketplace Dashboard
            </h2>

        </div>

    </div>

    <div class="row">

        <!-- Products -->

        <div class="col-xl-3 col-md-6">

            <div class="card">

                <div class="card-body">

                    <h5 class="text-muted">
                        Products
                    </h5>

                    <h2 class="text-success fw-bold" th:text="${stats.totalProducts}">
                    </h2>

                </div>

            </div>

        </div>

        <!-- Vendors -->

        <div class="col-xl-3 col-md-6">

            <div class="card">

                <div class="card-body">

                    <h5 class="text-muted">
                        Vendors
                    </h5>

                    <h2 class="text-primary fw-bold" th:text="${stats.totalVendors}">
                    </h2>

                </div>

            </div>

        </div>

        <!-- Orders -->

        <div class="col-xl-3 col-md-6">

            <div class="card">

                <div class="card-body">

                    <h5 class="text-muted">
                        Orders
                    </h5>

                    <h2 class="text-warning fw-bold" th:text="${stats.totalOrders}">
                    </h2>

                </div>

            </div>

        </div>

        <!-- Revenue -->

        <div class="col-xl-3 col-md-6">

            <div class="card">

                <div class="card-body">

                    <h5 class="text-muted">
                        Revenue
                    </h5>

                    <h2 class="text-dark fw-bold">

                        <span th:text="${stats.totalRevenue}">
                        </span>

                    </h2>

                </div>

            </div>

        </div>

    </div>

    <!-- Pending Vendors -->

    <div class="row mt-4">

        <div class="col-lg-6">

            <div class="card">

                <div class="card-body">

                    <h4 class="fw-bold mb-3">

                        Vendor Approval Queue

                    </h4>

                    <h1 class="text-danger" th:text="${stats.pendingVendors}">
                    </h1>

                    <p class="text-muted">

                        Vendors awaiting approval

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</html>
