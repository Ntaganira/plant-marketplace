<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/main-layout}">

<div layout:fragment="content">

    <div class="card">

        <img th:src="${vendor.bannerUrl}" class="img-fluid rounded-top" style="height: 300px;
                    object-fit: cover;">

        <div class="card-body">

            <div class="d-flex align-items-center">

                <img th:src="${vendor.logoUrl}" class="rounded-circle me-3" width="100" height="100">

                <div>

                    <h2 class="fw-bold" th:text="${vendor.businessName}">
                    </h2>

                    <p class="text-muted" th:text="${vendor.city}">
                    </p>

                </div>

            </div>

            <hr>

            <p th:text="${vendor.description}">
            </p>

        </div>

    </div>

</div>

</html>
