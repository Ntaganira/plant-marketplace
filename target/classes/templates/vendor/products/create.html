<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/main-layout}">

<div layout:fragment="content">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card">

                <div class="card-body">

                    <h3 class="fw-bold mb-4">

                        Create Product

                    </h3>

                    <form th:action="@{/vendor/products/create}" method="post" th:object="${product}">

                        <div class="mb-3">

                            <label class="form-label">
                                Product Name
                            </label>

                            <input type="text" class="form-control" th:field="*{name}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Price
                            </label>

                            <input type="number" step="0.01" class="form-control" th:field="*{price}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Stock Quantity
                            </label>

                            <input type="number" class="form-control" th:field="*{stockQuantity}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Thumbnail URL
                            </label>

                            <input type="hidden" th:field="*{thumbnailUrl}" id="thumbnailUrl">

                            <input type="file" class="form-control" id="imageUpload" accept="image/*">

                            <div class="mt-3">

                                <img id="previewImage" class="img-fluid rounded d-none" style="max-height: 300px;">

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea class="form-control" rows="5" th:field="*{description}">
                            </textarea>

                        </div>

                        <button class="btn btn-success">

                            Save Product

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    document
        .getElementById("imageUpload")
        .addEventListener("change", async function (e) {

            const file = e.target.files[0];

            if (!file) {
                return;
            }

            const formData = new FormData();

            formData.append("file", file);

            const response = await fetch(
                "/api/v1/storage/products/upload",
                {
                    method: "POST",
                    body: formData
                }
            );

            const result = await response.json();

            if (result.success) {

                document
                    .getElementById("thumbnailUrl")
                    .value =
                    result.data.fileUrl;

                const preview =
                    document.getElementById(
                        "previewImage"
                    );

                preview.src =
                    result.data.fileUrl;

                preview.classList.remove(
                    "d-none"
                );
            }
        });

</script>

</html>
